<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Product Scanner</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      margin: 0;
      padding: 24px;
    }
    .wrap {
      max-width: 900px;
      margin: 0 auto;
    }
    h1 {
      margin: 0 0 8px;
    }
    .sub {
      color: #94a3b8;
      margin-bottom: 20px;
    }
    .card {
      background: #111827;
      border: 1px solid #334155;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .empty {
      padding: 24px;
      border: 1px dashed #475569;
      border-radius: 14px;
      color: #cbd5e1;
      background: #0b1220;
    }
    .row {
      display: grid;
      grid-template-columns: 2fr 1.5fr 1.5fr 1fr 1fr;
      gap: 12px;
      font-size: 14px;
    }
    .head {
      font-weight: bold;
      color: #93c5fd;
      margin-bottom: 10px;
    }
    .pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 12px;
    }
    .expired { background: #7f1d1d; color: #fecaca; }
    .soon { background: #78350f; color: #fde68a; }
    .ok { background: #14532d; color: #bbf7d0; }
    .none { background: #1e293b; color: #cbd5e1; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Product Scanner</h1>
    <div class="sub">Say “scan” in the glasses app to begin. Recent scanned items appear below.</div>

    <div id="content" class="empty">Loading…</div>
  </div>

  <script>
    async function loadItems() {
      const content = document.getElementById('content');

      try {
        const res = await fetch('/api/items');
        const items = await res.json();

        if (!Array.isArray(items) || items.length === 0) {
          content.className = 'empty';
          content.innerHTML = `
            <div>No items scanned yet.</div>
            <div style="margin-top:8px;">Say “scan” in the glasses app to start scanning a product.</div>
          `;
          return;
        }

        const rows = items.map(item => {
          let expiryClass = 'none';
          let expiryText = 'No date';

          if (item.no_expiry_confirmed) {
            expiryClass = 'none';
            expiryText = 'No expiry';
          } else if (item.is_expired) {
            expiryClass = 'expired';
            expiryText = `Expired ${Math.abs(item.days_until_expiry || 0)}d ago`;
          } else if (item.days_until_expiry != null && item.days_until_expiry <= 7) {
            expiryClass = 'soon';
            expiryText = `${item.days_until_expiry}d left`;
          } else if (item.days_until_expiry != null) {
            expiryClass = 'ok';
            expiryText = `${item.days_until_expiry}d left`;
          }

          const scanned = new Date(item.scanned_at).toLocaleString();

          return `
            <div class="card">
              <div class="row">
                <div>${item.product_name || '—'}</div>
                <div>${item.manufacturer || '—'}</div>
                <div>${item.barcode || '—'}</div>
                <div><span class="pill ${expiryClass}">${expiryText}</span></div>
                <div>${scanned}</div>
              </div>
            </div>
          `;
        }).join('');

        content.className = '';
        content.innerHTML = `
          <div class="card head row">
            <div>Product</div>
            <div>Brand</div>
            <div>Barcode</div>
            <div>Expiry</div>
            <div>Scanned</div>
          </div>
          ${rows}
        `;
      } catch (err) {
        content.className = 'empty';
        content.textContent = 'Could not load scanned items.';
      }
    }

    loadItems();
  </script>
</body>
</html>
